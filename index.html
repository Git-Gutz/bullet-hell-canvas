<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automata Hell - Proyecto Graficación 2D</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="icon" href="./assets/images/faviconSS.png">
</head>

<body class="bg-dark text-light d-flex flex-column main-container">

    <nav class="navbar navbar-dark shadow flex-shrink-0">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">PROYECTO: GRAFICACIÓN 2D</span>
            <span class="navbar-text text-white small">
                Leonardo Gutiérrez | Ing. En Sistemas Computacionales
            </span>
        </div>
    </nav>

    <div class="container-fluid flex-grow-1 my-2 content-wrapper">
        <div class="row h-100 gx-3">

            <div class="col-12 col-lg-8 mb-3 mb-lg-0 d-flex justify-content-center align-items-center game-column">
                <div class="arcade-window">
                    <canvas id="gameCanvas" width="900" height="600"></canvas>
                    <div class="crt-overlay"></div>
                </div>
            </div>

            <div class="col-12 col-lg-4 info-column">
                <div class="card shadow-lg h-100">
                    <div class="card-header text-center">
                        <h4 class="mb-0">ESTADO DEL SISTEMA</h4>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-between overflow-auto">

                        <div class="hud-stats mb-3">
                            <h5 class="text-info">SCORE: <span id="ui-score" class="text-white">000000</span></h5>
                            <h6 class="text-warning">HIGH SCORE: <span id="ui-highscore"
                                    class="text-white">000000</span></h6>
                            <hr class="border-secondary my-3">
                            <div class="stat-box">
                                <span>NIVEL:</span>
                                <span id="ui-level" class="stat-value">01</span>
                        </div>
                        <div class="stat-box">
                            <span>HORDA:</span>
                            <span id="ui-wave" class="stat-value">01</span>
                        </div>
                    </div>

                    <div class="instructions-box mb-4">
                        <strong>SISTEMA DE CONTROL:</strong><br>
                        - MOUSE: GUIAR NAVE<br>
                        - SPACE: LÁSER ENERGÍA
                    </div>

                    <div class="d-grid gap-2">
                        <button id="btn-start" class="btn btn-arcade-success btn-lg">INICIAR_SISTEMA</button>
                        <button id="btn-pause" class="btn btn-arcade-warning" disabled>PAUSA</button>
                        <button id="btn-restart" class="btn btn-arcade-danger">REINICIAR</button>
                        <div id="level-selection-panel" class="arcade-panel">
                            <h3 class="panel-title">SELECCIÓN_DE_FASE</h3>
                            <div id="level-buttons-container" class="level-grid">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <footer class="text-center text-muted py-2 flex-shrink-0">
        <small>&copy; 2026 INSTITUTO TECNOLÓGICO DE PACHUCA</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Esto garantiza que el objeto exista siempre, aunque esté vacío al principio.
        window.Assets = {
            images: {},
            isLoaded: false
        };
    </script>
    <script src="./assets/js/patterns/movementPatterns.js"></script>
    <script src="./assets/js/data/enemyConfigs.js"></script>
    <script src="./assets/js/data/powerUpConfigs.js"></script>
    <script src="./assets/js/data/waveConfigs.js"></script>
    <script src="./assets/js/data/levelConfigs.js"></script>


    <script src="./assets/js/entities/powerUp.js"></script>
    <script src="./assets/js/entities/enemy.js"></script>
    <script src="./assets/js/entities/enemyBullet.js"></script>
    <script src="./assets/js/entities/bullet.js"></script>
    <script src="./assets/js/entities/player.js"></script>
    <script src="./assets/js/entities/waveManager.js"></script>


    <script src="./assets/js/utils.js"></script>
    <script src="./assets/js/input.js"></script>
    <script src="./assets/js/game.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
